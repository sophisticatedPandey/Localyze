# ===========================
# Localyze Application Configuration
# ===========================

server:
    port: 8080

spring:
    # Database Configuration
    datasource:
        url: jdbc:mysql://localhost:3306/localyze?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
        username: root
        password: [your-mysql-password]
        driver-class-name: com.mysql.cj.jdbc.Driver

    # JPA / Hibernate
    jpa:
        hibernate:
            ddl-auto: validate
        show-sql: true
        open-in-view: false
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQLDialect
                format_sql: true

    # Mail Configuration
    mail:
        host: smtp.gmail.com
        port: 587
        username: [your-email-address]
        password: [your-email-app-password]
        properties:
            mail:
                smtp:
                    auth: true
                    starttls:
                        enable: true
                        required: true

    # File Upload
    servlet:
        multipart:
            max-file-size: 5MB
            max-request-size: 5MB

# JWT Configuration
jwt:
    secret: [your-jwt-secret]
    access-token-expiry: 900000 # 15 minutes in ms
    refresh-token-expiry: 604800000 # 7 days in ms

# Cloudinary Configuration
cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:your-cloud-name}
    api-key: ${CLOUDINARY_API_KEY:your-api-key}
    api-secret: ${CLOUDINARY_API_SECRET:your-api-secret}

# Razorpay Configuration
razorpay:
    key-id: [razorpay-key-id]
    key-secret: [razorpay-key-secret]
